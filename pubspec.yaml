name: ezan_vakti
description: "Türkiye'nin 81 ili için namaz vakitleri — Açık kaynak ve ücretsiz"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.4

dependencies:
  adhan: ^2.0.0+1
  alarm: ^5.2.1
  audioplayers: ^6.4.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.0
  dio: ^5.9.2
  drift: ^2.32.1
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_compass_v2: ^1.0.3
  flutter_local_notifications: ^21.0.0
  flutter_map: ^8.2.2
  flutter_map_tile_caching: ^10.0.0
  flutter_qiblah: ^3.2.0
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.2.4
  geolocator: ^14.0.2
  google_fonts: ^8.0.2
  home_widget: ^0.9.0
  in_app_review: ^2.0.11
  intl: ^0.20.2
  timezone: ^0.11.0
  latlong2: ^0.9.1
  lottie: ^3.3.2
  package_info_plus: ^9.0.1
  path: ^1.9.0
  path_provider: ^2.1.5
  pdf: ^3.12.0
  permission_handler: ^12.0.1
  printing: ^5.14.3
  sensors_plus: ^6.1.1
  device_info_plus: ^11.3.3
  riverpod_annotation: ^4.0.2
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  sqflite: ^2.4.0
  sqlite3_flutter_libs: ^0.6.0+eol
  url_launcher: ^6.3.2
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.32.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon_1024.png"
  adaptive_icon_foreground: "assets/images/app_icon_1024.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - assets/data/turkey_cities.json
    - assets/data/duas.json
    - assets/data/world_cities.json
    - assets/data/prayer_times/2026/
    - assets/data/prayer_times/2027/
    - assets/data/prayer_times/2028/
    - assets/sounds/
    - assets/images/
